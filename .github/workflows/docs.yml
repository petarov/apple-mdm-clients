name: Publish Javadoc

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '[0-9]*'
    paths:
      - 'shared-apple-client/src/**'
      - 'device-assignment-client/src/**'
      - 'legacy-app-and-book-management-client/src/**'
      - 'apple-business-client/src/**'
      - '**/build.gradle'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle 9.6.1
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.6.1'

      - name: Grant exec permission for gradlew
        run: chmod +x gradlew

      - name: Render README as landing page
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          git checkout --quiet origin/main
          mkdir -p site
          pandoc README.md -o site/index.html \
            --standalone --metadata title="Apple MDM clients for Java"
          cp apple-cogs.png site/

      - name: Generate aggregated Javadoc for main and latest tag
        run: |
          set -euo pipefail

          build_ref() {
            local ref="$1" label="$2"
            echo "::group::Building docs for $label ($ref)"
            git checkout --quiet "$ref"
            ./gradlew clean aggregateJavadoc --no-daemon
            mkdir -p "site/$label"
            cp -r build/docs/aggregateJavadoc/. "site/$label/"
            echo "::endgroup::"
          }

          latest_tag=$(git tag --list '[0-9]*' --sort=-v:refname | head -n1 || true)

          build_ref origin/main main
          if [ -n "$latest_tag" ]; then
            build_ref "refs/tags/$latest_tag" "$latest_tag"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
