name: Publish Javadoc

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle 9.6.1
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.6.1'

      - name: Grant exec permission for gradlew
        run: chmod +x gradlew

      - name: Generate aggregated Javadoc
        run: ./gradlew aggregateJavadoc --no-daemon

      - name: Render README as landing page
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          pandoc README.md -o build/docs/aggregateJavadoc/index.html \
            --standalone --metadata title="Apple MDM clients for Java"
          cp apple-cogs.png build/docs/aggregateJavadoc/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/aggregateJavadoc

      - id: deployment
        uses: actions/deploy-pages@v4
